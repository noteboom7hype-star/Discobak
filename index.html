<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Discobak</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #ff7e00, #ffb347);
      font-family: Arial, sans-serif;
      color: white;
    }

    h1 {
      font-size: 4em;
      margin-bottom: 20px;
    }

    a button {
      padding: 12px 24px;
      font-size: 1.2em;
      font-weight: bold;
      color: #ff7e00;
      background-color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: transform 0.2s ease, background-color 0.3s ease;
    }

    a button:hover {
      background-color: #ffe0c2;
      transform: scale(1.05);
    }
  </style>
</head>
<body>
  <h1>Discobak</h1>
  <a href="https://forms.gle/aAGgNHKuciMHVF6X8" target="_blank">
    <button>Poller</button>
  </a>
</body>
</html>
